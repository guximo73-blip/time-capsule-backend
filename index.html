    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>

ize:12px}.import-stats-bar{display:flex;gap:20px;margin:8px 0 12px;flex-wrap:wrap;font-size:14px}.import-stats-bar .stat-item{display:flex;align-items:center;gap:4px}.import-stats-bar .stat-item .num{font-weight:700;font-size:16px}.import-stats-bar .stat-item .num.green{color:#66BB6A}.import-stats-bar .stat-item .num.red{color:#f87171}.import-stats-bar .stat-item .num.yellow{color:#ffd54f}.import-toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}.import-toolbar .hint-text{font-size:13px;opacity:.7;margin-right:auto}.import-toolbar button{padding:5px 16px;border-radius:6px;border:none;cursor:pointer;font-size:14px;transition:opacity .2s;font-weight:500}.import-toolbar .btn-outline{background:transparent;border:1px solid var(--border-color);color:var(--text-color)}.import-toolbar .btn-outline:hover{background:rgba(255,255,255,.06)}.import-toolbar .btn-primary{background:var(--btn-active);color:#000}.import-toolbar .btn-primary:hover{opacity:.85}.import-toolbar .btn-success{background:#66BB6A;color:#000}.import-toolbar .btn-success:hover{opacity:.85}.import-toolbar .btn-danger{background:var(--danger);color:#fff}.import-toolbar .btn-danger:hover{opacity:.85}#importFileInput,#importExcelInput{display:none}.import-progress{margin-top:10px;padding:8px 14px;border-radius:6px;background:rgba(255,255,255,.04);font-size:14px;display:none}.import-progress.active{display:block}.import-progress .progress-bar{height:4px;background:var(--border-color);border-radius:2px;margin-top:6px;overflow:hidden}.import-progress .progress-bar .fill{height:100%;background:var(--btn-active);width:0;transition:width .3s;border-radius:2px}.import-result-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:14px 30px;border-radius:10px;background:var(--modal-card-bg);border:1px solid var(--border-color);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:2000;font-size:15px;text-align:center;max-width:90%;backdrop-filter:blur(4px);display:none}.import-result-toast.show{display:block;animation:fadeUp .3s ease}@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}.import-result-toast .toast-close{margin-left:16px;cursor:pointer;opacity:.6;background:0 0;border:none;color:var(--text-color);font-size:18px}.import-result-toast .toast-close:hover{opacity:1}.import-result-toast.success{border-color:#66BB6A}.import-result-toast.error{border-color:#f87171}.import-result-toast.warning{border-color:#ffd54f}@media (max-width:800px){.modal-wrap{flex-direction:column}.modal-img-box,.modal-info{width:100%}.modal-img-box{max-height:320px}h1{font-size:34px}.current-ym{font-size:17px;min-width:120px;padding:4px 12px}body{padding:0 16px 40px}}

<body>
    <h1>WINTER RECORD</h1>
    <div class="subtitle">幸福的终点是旼炡和你</div>
    <div class="person-filter-bar" id="personBar"></div>
    <div class="control-group">
        <div class="calendar-control" style="margin:0;gap:8px;flex:1;justify-content:center;">
            <button class="cal-btn" id="prevMonth">◀</button>
            <span class="current-ym" id="ymDisplay">2026年7月</span>
            <button class="cal-btn" id="nextMonth">▶</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;">
            <input id="searchInput" placeholder="🔍 搜索日程..." />
            <button id="addBtn">➕ 新建日程</button>
            <button id="importBtn">📥 批量导入</button>
        </div>
    </div>
    <div id="calendar-area"></div>
    <div class="stats" id="stats-area"></div>

    <!-- 年月选择器 -->
    <div class="ym-picker-overlay" id="ymPickerOverlay">
        <div class="ym-picker-box">
            <h3>📅 选择年月</h3>
            <div class="ym-picker-row">
                <select id="ymYearSelect"></select><span>年</span>
                <select id="ymMonthSelect"></select><span>月</span>
            </div>
            <div class="ym-picker-actions">
                <button class="ym-btn-confirm" id="ymConfirm">确认</button>
                <button class="ym-btn-cancel" id="ymCancel">取消</button>
            </div>
        </div>
    </div>

    <!-- 详情模态框 -->
    <div class="modal-mask" id="modalMask">
        <div class="modal-wrap">
            <div class="modal-img-box" id="modalMediaBox"><span class="no-media">暂无媒体</span></div>
            <div class="modal-info">
                <div id="modalPersonTags" class="modal-person-tags"></div>
                <div class="modal-title" id="modalTitle"></div>
                <div id="modalLinkList"></div>
                <div class="modal-actions">
                    <button class="modal-edit-btn" id="modalEditBtn">✏️ 编辑</button>
                    <button class="modal-delete-btn" id="modalDeleteBtn">🗑️ 删除</button>
                </div>
            </div>
            <button class="modal-close" id="modalClose">×</button>
        </div>
    </div>

    <!-- 新建/编辑模态框 -->
    <div class="modal-mask form-modal" id="formModal">
        <div class="modal-wrap">
            <div class="modal-info">
                <div class="form-title" id="formTitle">📝 新建日程</div>
                <form id="scheduleForm" autocomplete="off">
                    <div class="form-row">
                        <div class="form-group">
                            <label>日期 <span class="required">*</span></label>
                            <input type="text" id="formDate" placeholder="YYYY-MM-DD 或 240529" required />
                            <div class="hint">支持 YYYY-MM-DD 或 6/8位数字</div>
                        </div>
                        <div class="form-group">
                            <label>人物 <span class="required">*</span></label>
                            <div id="personCheckboxContainer" class="person-checkbox-group"></div>
                            <div class="hint">可多选</div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>标题 <span class="required">*</span></label>
                        <input type="text" id="formTitleInput" placeholder="如：Winter 新物料发布" required />
                    </div>
                    <div class="form-group">
                        <label>链接 (JSON 格式，可选)</label>
                        <textarea id="formLinks" placeholder='[{"icon":"📸","text":"Instagram","link":"https://..."}]'></textarea>
                        <div class="hint">💡 格式：<code>[{"icon":"图标","text":"显示文字","link":"网址"}]</code></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>缩略图地址（可选）</label>
                            <input type="text" id="formThumbnail" placeholder="图片URL（优先展示）" />
                        </div>
                        <div class="form-group">
                            <label>视频嵌入地址（可选）</label>
                            <input type="text" id="formVideo" placeholder="支持 B站 / YouTube 等" />
                            <div class="hint">📌 部分平台自动转为跳转链接。</div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-cancel" id="formCancel">取消</button>
                        <button type="submit" class="btn-submit" id="formSubmitBtn">✅ 保存</button>
                    </div>
                </form>
            </div>
            <button class="modal-close" id="formClose">×</button>
        </div>
    </div>

    <!-- 批量导入模态框 -->
    <div class="modal-mask import-modal" id="importModal">
        <div class="modal-wrap">
            <div class="modal-info">
                <div class="form-title">📥 批量导入日程</div>
                <div style="margin-bottom:12px;color:#aaa;font-size:14px;line-height:1.7;">
                    粘贴 JSON 数组数据，或上传 JSON / Excel 文件。每条数据需包含
                    <code style="background:rgba(255,255,255,0.07);padding:1px 8px;border-radius:3px;">date</code>、
                    <code style="background:rgba(255,255,255,0.07);padding:1px 8px;border-radius:3px;">person</code>、
                    <code style="background:rgba(255,255,255,0.07);padding:1px 8px;border-radius:3px;">title</code> 字段。

        importExcelBtn.onclick=()=>importExcelInput.click();importExcelInput.onchange=function(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(ev){try{const data=new Uint8Array(ev.target.result);const workbook=XLSX.read(data,{type:'array'});const firstSheet=workbook.Sheets[workbook.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(firstSheet);if(!rows||rows.length===0){alert('Excel 文件为空或格式不正确。');return}const mapped=rows.map(row=>{const date=row['日期']||row['date']||row['Date']||'';let person=row['人物']||row['person']||row['Person']||'';if(typeof person==='string'&&person.includes(',')){person=person.split(',').map(s=>s.trim())}else if(typeof person==='string'){person=[person.trim()]}else if(!Array.isArray(person)){person=[]}const title=row['标题']||row['title']||row['Title']||'';let links=row['链接']||row['links']||'';if(typeof links==='string'&&links.trim().startsWith('[')){try{links=JSON.parse(links)}catch{}}const thumbnail=row['缩略图']||row['thumbnail']||'';const videoEmbed=row['视频嵌入']||row['videoEmbed']||'';return{date,person,title,links,thumbnail,videoEmbed}});const filtered=mapped.filter(item=>item.date&&item.title);if(filtered.length===0){alert('Excel 中未找到有效数据，请确保列名包含：日期、人物、标题（或 date, person, title）');return}importDataText.value=JSON.stringify(filtered,null,2);setTimeout(()=>previewImportBtn.click(),300)}catch(err){alert('解析 Excel 失败：'+err.message)}};reader.readAsArrayBuffer(file);importExcelInput.value=''};
        previewImportBtn.onclick=function(){const raw=importDataText.value.trim();if(!raw){alert('请先粘贴或上传数据。');return}let parsed;try{parsed=JSON.parse(raw)}catch(err){alert('JSON 解析失败：'+err.message);return}if(!Array.isArray(parsed)||parsed.length===0){alert('数据必须是非空数组。');return}const result=parsed.map((item,idx)=>{const errors=[];const norm={...item};if(!item.date)errors.push('缺少 date');else{norm.date=normalizeDateInput(item.date);if(!isValidDate(norm.date))errors.push('date 格式无效')}if(!item.person)errors.push('缺少 person');else{let persons=item.person;if(typeof persons==='string'){persons=persons.includes(',')?persons.split(',').map(s=>s.trim()):[persons.trim()]}if(!Array.isArray(persons)||persons.length===0)errors.push('person 至少选一人');else{const valid=persons.filter(p=>personList.includes(p));if(valid.length===0)errors.push('person 不在允许列表中');norm.person=valid.length?valid:persons}}if(!item.title)errors.push('缺少 title');norm.shortName=item.shortName||(item.title?(item.title.length>20?item.title.slice(0,18)+'…':item.title):'未命名');if(norm.links&&!Array.isArray(norm.links)){try{norm.links=typeof norm.links==='string'?JSON.parse(norm.links):[]}catch{norm.links=[]}}if(!norm.links)norm.links=[];let isDuplicate=false;if(errors.length===0){isDuplicate=isDuplicateWithExisting(norm)}return{index:idx+1,raw:item,normalized:norm,valid:errors.length===0,duplicate:isDuplicate,errors}});importPreviewData=result;const tbody=importPreviewBody;tbody.innerHTML='';let valid=0,invalid=0,duplicate=0;result.forEach(r=>{const tr=document.createElement('tr');if(r.duplicate){tr.className='duplicate'}else if(r.valid){tr.className='valid'}else{tr.className='invalid'}const personsDisplay=Array.isArray(r.normalized.person)?r.normalized.person.map(p=>personDisplayMap[p]||p).join(', '):String(r.normalized.person||'');let statusHtml='';if(r.duplicate){statusHtml=`<span class="status-badge duplicate">⚠️ 重复（将跳过）</span><div class="dup-msg">视频或缩略图已存在</div>`}else if(r.valid){statusHtml=`<span class="status-badge valid">✅ 可导入</span>`}else{statusHtml=`<span class="status-badge invalid">❌ 无效</span><div class="err-msg">${r.errors.join('; ')}</div>`}tr.innerHTML=`<td>${r.index}</td><td>${r.normalized.date||'-'}</td><td>${personsDisplay||'-'}</td><td>${r.normalized.title||'-'}</td><td>${statusHtml}</td>`;tbody.appendChild(tr);if(r.duplicate)duplicate++;else if(r.valid)valid++;else invalid++});importTotalCount.textContent=result.length;importValidCount.textContent=valid;importDuplicateCount.textContent=duplicate;importInvalidCount.textContent=invalid;importPreviewArea.style.display='block';importProgress.classList.remove('active');importConfirmBtn.disabled=valid===0;importConfirmBtn.style.opacity=valid===0?'0.5':'1'};
        importConfirmBtn.onclick=async function(){if(this.disabled)return;const validItems=importPreviewData.filter(r=>r.valid&&!r.duplicate);if(!validItems.length){alert('没有可导入的有效数据（所有条目均无效或重复）。');return}if(!confirm(`确定要导入 ${validItems.length} 条日程吗？（重复的 ${importPreviewData.filter(r=>r.duplicate).length} 条将被跳过）`))return;importProgress.classList.add('active');importProgressText.textContent=`正在导入 0 / ${validItems.length} ...`;importProgressFill.style.width='0%';this.disabled=true;let success=0,fail=0;for(let i=0;i<validItems.length;i++){const item=validItems[i].normalized;try{const formData={date:item.date,person:item.person,tag:item.tag||'',shortName:item.shortName,title:item.title,links:JSON.stringify(item.links||[]),videoEmbed:item.videoEmbed||'',thumbnail:item.thumbnail||''};const resp=await fetch(`${API_BASE}/data`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(formData)});if(!resp.ok)throw new Error(`HTTP ${resp.status}`);const newItem=await resp.json();ensurePersonArray(newItem);scheduleList.push(newItem);success++}catch(err){fail++;console.error(`第 ${i+1} 条导入失败:`,err)}const done=i+1;importProgressText.textContent=`正在导入 ${done} / ${validItems.length} ...`;importProgressFill.style.width=`${(done/validItems.length)*100}%`}const totalDuplicate=importPreviewData.filter(r=>r.duplicate).length;importProgressText.textContent=`✅ 导入完成！成功 ${success} 条，失败 ${fail} 条，跳过重复 ${totalDuplicate} 条。`;importProgressFill.style.width='100%';let msg=`📥 批量导入完成：成功 ${success} 条`;if(fail>0)msg+=`，失败 ${fail} 条`;if(totalDuplicate>0)msg+=`，跳过重复 ${totalDuplicate} 条`;showToast(msg,fail===0?'success':'error');renderAll();setTimeout(()=>{closeImportModal();importConfirmBtn.disabled=false;importProgress.classList.remove('active')},1200)};
